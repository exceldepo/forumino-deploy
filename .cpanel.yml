---
deployment:
  tasks:
    - export DEPLOYPATH=/home/forumino/public_html
    - export PHP=/opt/cpanel/ea-php84/root/usr/bin/php
    # Eklenti dosyalarını sync et
    - /bin/mkdir -p $DEPLOYPATH/src/addons/SelamT
    - /bin/rm -rf $DEPLOYPATH/src/addons/SelamT/XFRMSeoBoost
    - /bin/cp -R addon/SelamT/XFRMSeoBoost $DEPLOYPATH/src/addons/SelamT/
    # Çeviri XML'lerini sync et
    - /bin/rm -rf $DEPLOYPATH/_translations
    - /bin/cp -R translations $DEPLOYPATH/_translations
    # XF eklenti install (yoksa) — varsa: önce upgrade dene (yeni version), olmazsa rerun (aynı version, XML re-import)
    - cd $DEPLOYPATH && ($PHP cmd.php xf-addon:install SelamT/XFRMSeoBoost --no-interaction || $PHP cmd.php xf-addon:upgrade SelamT/XFRMSeoBoost --no-interaction || $PHP cmd.php xf-addon:rerun SelamT/XFRMSeoBoost --no-interaction)
    # TR çevirileri toplu import
    - cd $DEPLOYPATH && $PHP cmd.php selamt:import-translations --language=tr
